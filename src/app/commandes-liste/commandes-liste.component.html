<a routerLink="/new-commande">Nouvelle Commande</a>
<div class="list-group">
  <li class="list-group-item" *ngFor="let commande of commandes">
    <h3>{{commande.firstName}} {{commande.lastName}}</h3>
    <p>{{commande.email}}</p>
    <p>Cette personne préfère la boisson {{commande.drinkPreference}} </p>
    <p *ngIf="commande.hobbies && commande.hobbies.length>0">
      Cette personne a des Hobbies :
      <span *ngFor="let hobby of commande.hobbies">{{hobby}} -</span>
    </p>
  </li>
</div>
